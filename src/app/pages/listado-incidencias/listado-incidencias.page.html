<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Listado de incidencias</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  @if (incidencias().length === 0) {
   <p class="no-incidencias">
    No hay incidencias guardadas
  </p>
  }

  @if (incidencias().length > 0) {

  <ion-list class="incidencias-list">
    @for (i of incidencias(); track i.id) {
    <ion-item class="incidencia-item">

      <ion-thumbnail slot="start" class="incidencia-thumb">
        <img [src]="i.photo" />
      </ion-thumbnail>

      <ion-label class="incidencia-label">
        <h2 class="titulo-incidencia">{{ i.createdAt | date:'short' }}</h2>
        <p>Lat: {{ i.latitude }}</p>
        <p>Lng: {{ i.longitude }}</p>
      </ion-label>

    </ion-item>
    }
  </ion-list>

  }

</ion-content>
